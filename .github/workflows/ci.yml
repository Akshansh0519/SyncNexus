name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm run lint --prefix frontend

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: syncnexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      chromadb:
        image: chromadb/chroma:0.5.3
        ports:
          - 8000:8000

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:password@localhost:5432/syncnexus
      REDIS_URL: redis://localhost:6379
      CHROMA_URL: http://localhost:8000
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: syncnexus-files
      ACCESS_TOKEN_SECRET: ci_access_secret_32chars_minimum_length
      REFRESH_TOKEN_SECRET: ci_refresh_secret_32chars_minimum_length
      CLIENT_URL: http://localhost:3001
      PORT: 3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Start MinIO container
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-06-13T22-53-53Z server /data

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Wait for ChromaDB
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/heartbeat && break || sleep 2
          done

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break || sleep 2
          done

      - name: Run tests
        run: npm run test:ci

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Docker Compose build (backend + worker)
        run: docker compose build app worker

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend (Vite)
        run: npm run build --prefix frontend

      - name: Docker build frontend image
        run: docker build -t syncnexus-frontend ./frontend
